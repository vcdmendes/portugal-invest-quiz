<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portugal Coastal Investment Quiz</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #f0ede8;
    --text-dim: #7a7772;
    --text-mid: #a8a4a0;
    --accent-c: #c9a96e; /* gold for Comporta */
    --accent-q: #4a8fa3; /* teal for Quinta */
    --accent-k: #7a8e6e; /* sage for Cascais */
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── HERO ── */
  .hero {
    width: 100%;
    background: linear-gradient(160deg, #0a0a0a 0%, #111 50%, #0d0d0d 100%);
    border-bottom: 1px solid var(--border);
    padding: 48px 24px 40px;
    text-align: center;
  }
  .hero-flag { font-size: 2rem; margin-bottom: 12px; }
  .hero h1 {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 10px;
  }
  .hero h1 strong { font-weight: 700; }
  .hero p {
    color: var(--text-mid);
    font-size: 0.95rem;
    max-width: 480px;
    margin: 0 auto 28px;
    line-height: 1.6;
  }
  .area-pills {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }
  .pill {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border: 1px solid;
  }
  .pill-c { color: var(--accent-c); border-color: var(--accent-c); background: rgba(201,169,110,0.08); }
  .pill-q { color: var(--accent-q); border-color: var(--accent-q); background: rgba(74,143,163,0.08); }
  .pill-k { color: var(--accent-k); border-color: var(--accent-k); background: rgba(122,142,110,0.08); }

  .start-btn {
    background: var(--text);
    color: var(--bg);
    border: none;
    padding: 14px 40px;
    border-radius: 6px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: opacity 0.2s;
  }
  .start-btn:hover { opacity: 0.85; }

  /* ── QUIZ WRAPPER ── */
  .quiz-wrapper {
    width: 100%;
    max-width: 700px;
    padding: 0 20px 60px;
    display: none;
  }

  /* ── PROGRESS ── */
  .progress-bar-wrap {
    padding: 28px 0 24px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .progress-label { font-size: 0.78rem; color: var(--text-mid); letter-spacing: 0.06em; text-transform: uppercase; }
  .progress-count { font-size: 0.78rem; color: var(--text-dim); }
  .progress-track {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-c), var(--accent-q));
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── QUESTION CARD ── */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 20px;
    animation: slideIn 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .q-number {
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .q-text {
    font-size: 1.2rem;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 24px;
    letter-spacing: -0.01em;
  }
  .q-subtitle {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-top: -18px;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    cursor: pointer;
    text-align: left;
    transition: all 0.18s;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .option-btn:hover {
    border-color: rgba(255,255,255,0.2);
    background: #222;
    transform: translateX(3px);
  }
  .option-btn.selected {
    border-color: var(--text);
    background: rgba(255,255,255,0.05);
  }
  .option-icon {
    font-size: 1.3rem;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .option-content {}
  .option-label {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }
  .option-desc {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 3px;
    line-height: 1.4;
  }

  /* ── NAV ── */
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .nav-back, .nav-next {
    padding: 12px 24px;
    border-radius: 6px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    border: 1px solid;
  }
  .nav-back {
    background: transparent;
    color: var(--text-mid);
    border-color: var(--border);
  }
  .nav-back:hover { border-color: var(--text-mid); }
  .nav-next {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
    margin-left: auto;
    min-width: 120px;
    text-align: center;
  }
  .nav-next:hover { opacity: 0.85; }
  .nav-next:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* ── RESULTS ── */
  .results-wrapper {
    width: 100%;
    max-width: 760px;
    padding: 0 20px 80px;
    display: none;
    animation: fadeIn 0.5s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .results-header {
    text-align: center;
    padding: 48px 0 36px;
  }
  .results-header .trophy { font-size: 3rem; margin-bottom: 16px; }
  .results-header h2 {
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 300;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .results-header p { color: var(--text-mid); font-size: 0.9rem; }

  .winner-banner {
    border-radius: 14px;
    padding: 32px;
    margin-bottom: 28px;
    border: 1px solid;
    position: relative;
    overflow: hidden;
  }
  .winner-banner::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.06;
    background: currentColor;
  }
  .winner-tag {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.7;
  }
  .winner-name {
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 12px;
    line-height: 1;
  }
  .winner-tagline {
    font-size: 1rem;
    opacity: 0.8;
    line-height: 1.5;
    max-width: 520px;
  }
  .score-bar-section {
    margin: 20px 0 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .score-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .score-name { font-size: 0.8rem; min-width: 160px; opacity: 0.7; }
  .score-track {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
  }
  .score-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
  }
  .score-pct { font-size: 0.8rem; min-width: 36px; text-align: right; opacity: 0.7; }

  /* ── AREA CARDS ── */
  .area-cards { display: flex; flex-direction: column; gap: 16px; margin-top: 32px; }
  .area-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    position: relative;
  }
  .area-card.is-winner {
    border-color: currentColor;
  }
  .area-card-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }
  .area-emoji { font-size: 1.8rem; }
  .area-card-title { font-size: 1.1rem; font-weight: 600; }
  .area-card-sub { font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
  .best-for-label { font-size: 0.72rem; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .tag {
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 0.75rem;
    background: var(--surface2);
    color: var(--text-mid);
    border: 1px solid var(--border);
  }
  .area-desc {
    font-size: 0.88rem;
    color: var(--text-mid);
    line-height: 1.65;
  }
  .pros-cons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 16px;
  }
  .pros, .cons { font-size: 0.82rem; }
  .pros-header { color: #7dbf82; font-weight: 600; font-size: 0.75rem; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
  .cons-header { color: #bf7d7d; font-weight: 600; font-size: 0.75rem; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
  .pros li, .cons li { color: var(--text-mid); line-height: 1.8; list-style: none; padding-left: 14px; position: relative; }
  .pros li::before { content: '↑'; position: absolute; left: 0; color: #7dbf82; }
  .cons li::before { content: '↓'; position: absolute; left: 0; color: #bf7d7d; }

  .restart-btn {
    display: block;
    margin: 40px auto 0;
    background: transparent;
    color: var(--text-mid);
    border: 1px solid var(--border);
    padding: 12px 28px;
    border-radius: 6px;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.18s;
  }
  .restart-btn:hover { border-color: var(--text-mid); color: var(--text); }

  @media (max-width: 560px) {
    .pros-cons { grid-template-columns: 1fr; }
    .question-card { padding: 24px 20px; }
  }
</style>
</head>
<body>

<!-- ── LANDING ── -->
<section class="hero" id="hero">
  <div class="hero-flag">🇵🇹</div>
  <h1>Where Should You<br><strong>Invest in Portugal?</strong></h1>
  <p>Answer 10 questions about your lifestyle, goals, and preferences — and discover which coastal area fits you best.</p>
  <div class="area-pills">
    <span class="pill pill-c">🌿 Comporta / Melides</span>
    <span class="pill pill-q">⛳ Quinta do Lago</span>
    <span class="pill pill-k">⛵ Cascais / Estoril</span>
  </div>
  <button class="start-btn" onclick="startQuiz()">Start the Quiz →</button>
</section>

<!-- ── QUIZ ── -->
<div class="quiz-wrapper" id="quiz">
  <div class="progress-bar-wrap">
    <div class="progress-meta">
      <span class="progress-label">Your Investment Profile</span>
      <span class="progress-count" id="progress-count">1 of 10</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width: 10%"></div>
    </div>
  </div>
  <div id="question-area"></div>
  <div class="nav-row">
    <button class="nav-back" id="btn-back" onclick="goBack()" style="display:none">← Back</button>
    <button class="nav-next" id="btn-next" onclick="goNext()" disabled>Next →</button>
  </div>
</div>

<!-- ── RESULTS ── -->
<div class="results-wrapper" id="results"></div>

<script>
const AREAS = {
  C: { id: 'C', name: 'Comporta / Melides', emoji: '🌿', color: '#c9a96e', accent: 'var(--accent-c)',
       tagline: 'Raw beauty, emerging luxury, and Portugal\'s most coveted undiscovered coastline.',
       region: 'Setúbal · 1h30 from Lisbon',
       tags: ['Bohemian luxury', 'Dune beaches', 'Rising market', 'Nature retreats', 'Low density'],
       desc: 'Comporta and Melides are Portugal\'s fastest-rising real estate story — a wild, rice-padded coastline that has quietly become a favourite of European creatives, eco-conscious high-net-worth buyers, and anyone tired of the overdeveloped Algarve. Prices are still climbing but the upside is significant. Best for those who value raw natural beauty over polished resort infrastructure.',
       pros: ['Strongest price appreciation', 'Undeveloped coastline', 'Exclusive, low-density market', 'Strong short-term rental demand (summer)'],
       cons: ['Seasonal — quiet outside summer', 'Limited year-round infrastructure', 'Farther from Lisbon than Cascais', 'Less established rental track record'] },
  Q: { id: 'Q', name: 'Quinta do Lago', emoji: '⛳', color: '#4a8fa3', accent: 'var(--accent-q)',
       tagline: 'Europe\'s premier luxury resort — proven yields, world-class amenities, and unmatched prestige.',
       region: 'Algarve · 2h30 from Lisbon',
       tags: ['Luxury resort', 'Golf', 'Proven yields', 'Gated community', 'International buyers'],
       desc: 'Quinta do Lago is one of Europe\'s most prestigious private resort communities, with 3 championship golf courses, high-end dining, a beach club, and a tightly controlled property supply that keeps values robust. It attracts ultra-high-net-worth buyers from the UK, Northern Europe, and the Middle East. Rental yields are strong and the management infrastructure is established.',
       pros: ['Highest rental yields in Portugal', 'World-class amenities on-site', 'Very liquid, proven market', 'Strong international demand'],
       cons: ['Already expensive — less upside', 'Very seasonal (peak summer)', 'Gated resort can feel artificial', 'Service charges are high'] },
  K: { id: 'K', name: 'Cascais / Estoril', emoji: '⛵', color: '#7a8e6e', accent: 'var(--accent-k)',
       tagline: 'A cosmopolitan coastal town with year-round life, 30 minutes from Lisbon.',
       region: 'Estoril Coast · 30 min from Lisbon',
       tags: ['Year-round living', 'Near Lisbon', 'International schools', 'Vibrant culture', 'Diverse market'],
       desc: 'Cascais and Estoril offer something the other two cannot: a genuine, year-round community. With a fast train to Lisbon, international schools, world-class restaurants, a marina, and both modern apartments and historic villas, the Estoril Coast attracts digital nomads, families relocating from the UK and US, and long-term residents. A safer, more liquid market with steady appreciation.',
       pros: ['Year-round tenants & buyers', 'Only 30 min to Lisbon', 'Best schools & infrastructure', 'Very liquid resale market'],
       cons: ['Slower appreciation than Comporta', 'Less resort exclusivity', 'More urbanised feel', 'Summer prices spike but not as extreme'] }
};

const QUESTIONS = [
  {
    text: 'What is your investment budget?',
    sub: 'Total capital you\'re comfortable allocating to a single property.',
    options: [
      { icon: '💼', label: 'Under €600k', desc: 'Apartments, smaller villas or plots', scores: { C: 0, Q: 0, K: 3 } },
      { icon: '🏡', label: '€600k – €1.5M', desc: 'Villas, larger properties, premium locations', scores: { C: 2, Q: 1, K: 2 } },
      { icon: '💎', label: 'Over €1.5M', desc: 'Trophy assets, prime plots, ultra-luxury', scores: { C: 3, Q: 3, K: 1 } }
    ]
  },
  {
    text: 'What is your primary investment goal?',
    sub: 'Choose what matters most to you.',
    options: [
      { icon: '📈', label: 'Capital appreciation', desc: 'I want the highest long-term value growth', scores: { C: 3, Q: 1, K: 2 } },
      { icon: '💰', label: 'Rental yield & income', desc: 'Consistent returns, strong occupancy', scores: { C: 1, Q: 3, K: 2 } },
      { icon: '🌅', label: 'Lifestyle & personal use', desc: 'A beautiful base I also rent when away', scores: { C: 2, Q: 2, K: 3 } }
    ]
  },
  {
    text: 'How do you picture your ideal lifestyle there?',
    sub: 'Forget the investment hat for a moment.',
    options: [
      { icon: '🦩', label: 'Barefoot luxury', desc: 'Wild dunes, rice fields, outdoor showers, silence', scores: { C: 3, Q: 0, K: 0 } },
      { icon: '🏌️', label: 'Resort perfection', desc: 'Golf, spa, beach club, concierge, everything on-site', scores: { C: 0, Q: 3, K: 1 } },
      { icon: '🍽️', label: 'Cosmopolitan coast', desc: 'Great restaurants, sailing, markets, Lisbon weekends', scores: { C: 0, Q: 1, K: 3 } }
    ]
  },
  {
    text: 'How close do you want to be to Lisbon?',
    sub: 'Lisbon has an international airport and is Portugal\'s main hub.',
    options: [
      { icon: '🚆', label: '30 minutes', desc: 'I want easy access to the city, airport, and services', scores: { C: 0, Q: 0, K: 3 } },
      { icon: '🚗', label: '1 – 1.5 hours', desc: 'A bit of distance is fine if the destination is right', scores: { C: 2, Q: 1, K: 1 } },
      { icon: '✈️', label: 'Doesn\'t matter', desc: 'I\'ll fly in seasonally — proximity isn\'t a priority', scores: { C: 2, Q: 3, K: 0 } }
    ]
  },
  {
    text: 'How do you plan to use the property?',
    options: [
      { icon: '🗓️', label: 'Year-round base or long let', desc: 'Primary residence or always-tenanted investment', scores: { C: 0, Q: 0, K: 3 } },
      { icon: '☀️', label: 'Summer only — peak season rentals', desc: 'A seasonal escape with strong short-term income', scores: { C: 3, Q: 2, K: 1 } },
      { icon: '🔀', label: 'Flexible split', desc: 'I\'ll use it some months, rent it others', scores: { C: 2, Q: 2, K: 2 } }
    ]
  },
  {
    text: 'What kind of beach experience do you love?',
    options: [
      { icon: '🏝️', label: 'Wild & deserted', desc: 'Atlantic dunes, no crowds, no beach bars — just nature', scores: { C: 3, Q: 0, K: 0 } },
      { icon: '🏖️', label: 'Sheltered & golden', desc: 'Calm warm water, sunbeds, beach clubs and restaurants', scores: { C: 0, Q: 3, K: 1 } },
      { icon: '🌊', label: 'Town beach with character', desc: 'Promenades, cafés, surfers, a bit of everything', scores: { C: 1, Q: 0, K: 3 } }
    ]
  },
  {
    text: 'Which community appeals to you most?',
    options: [
      { icon: '🎨', label: 'Creative & bohemian', desc: 'Artists, architects, eco-conscious Europeans', scores: { C: 3, Q: 0, K: 1 } },
      { icon: '🤝', label: 'International luxury', desc: 'UHNWIs, golf enthusiasts, private & exclusive resort life', scores: { C: 0, Q: 3, K: 1 } },
      { icon: '🌍', label: 'Mixed local & expat', desc: 'Portuguese families, digital nomads, Lisbon weekenders', scores: { C: 1, Q: 0, K: 3 } }
    ]
  },
  {
    text: 'Do you need strong family infrastructure?',
    sub: 'Schools, hospitals, year-round shops, childcare.',
    options: [
      { icon: '🏫', label: 'Yes — essential', desc: 'International schools and full services are a must', scores: { C: 0, Q: 1, K: 3 } },
      { icon: '🏥', label: 'Nice to have', desc: 'Would prefer it but could adapt', scores: { C: 1, Q: 2, K: 2 } },
      { icon: '🌿', label: 'Not a priority', desc: 'I value nature and exclusivity over services', scores: { C: 3, Q: 2, K: 0 } }
    ]
  },
  {
    text: 'How do you feel about investment risk?',
    options: [
      { icon: '🛡️', label: 'Conservative — proven market', desc: 'I want stability and a liquid, established market', scores: { C: 0, Q: 2, K: 3 } },
      { icon: '⚖️', label: 'Balanced', desc: 'Some growth potential, some downside protection', scores: { C: 2, Q: 2, K: 2 } },
      { icon: '🚀', label: 'Growth-oriented', desc: 'I want the emerging hotspot — higher risk, higher reward', scores: { C: 3, Q: 1, K: 0 } }
    ]
  },
  {
    text: 'Which leisure activity fits your lifestyle most?',
    options: [
      { icon: '🏄', label: 'Surfing, yoga, eco retreats', desc: 'Atlantic coast, natural living, slow pace', scores: { C: 3, Q: 0, K: 1 } },
      { icon: '⛳', label: 'Golf, tennis, spa & wellness', desc: 'World-class sports and resort facilities', scores: { C: 0, Q: 3, K: 1 } },
      { icon: '🚢', label: 'Sailing, cycling & fine dining', desc: 'Marina life, coastal towns, Lisbon culture', scores: { C: 0, Q: 1, K: 3 } }
    ]
  }
];

// ── STATE ──
let current = 0;
let answers = new Array(QUESTIONS.length).fill(null);
let scores = { C: 0, Q: 0, K: 0 };

function startQuiz() {
  document.getElementById('hero').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[current];
  const pct = ((current + 1) / QUESTIONS.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-count').textContent = `${current + 1} of ${QUESTIONS.length}`;

  const selected = answers[current];
  document.getElementById('btn-next').disabled = selected === null;
  document.getElementById('btn-next').textContent = current === QUESTIONS.length - 1 ? 'See My Result →' : 'Next →';
  document.getElementById('btn-back').style.display = current > 0 ? 'inline-block' : 'none';

  const area = document.getElementById('question-area');
  area.innerHTML = `
    <div class="question-card">
      <div class="q-number">Question ${current + 1}</div>
      <div class="q-text">${q.text}</div>
      ${q.sub ? `<div class="q-subtitle">${q.sub}</div>` : ''}
      <div class="options">
        ${q.options.map((opt, i) => `
          <button class="option-btn ${selected === i ? 'selected' : ''}" onclick="selectOption(${i})">
            <span class="option-icon">${opt.icon}</span>
            <span class="option-content">
              <span class="option-label">${opt.label}</span>
              ${opt.desc ? `<span class="option-desc">${opt.desc}</span>` : ''}
            </span>
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function selectOption(i) {
  answers[current] = i;
  document.getElementById('btn-next').disabled = false;
  // visual update without full re-render
  document.querySelectorAll('.option-btn').forEach((btn, idx) => {
    btn.classList.toggle('selected', idx === i);
  });
}

function goNext() {
  if (answers[current] === null) return;
  if (current === QUESTIONS.length - 1) {
    showResults();
    return;
  }
  current++;
  renderQuestion();
}

function goBack() {
  if (current === 0) return;
  current--;
  renderQuestion();
}

function showResults() {
  // tally scores
  scores = { C: 0, Q: 0, K: 0 };
  answers.forEach((ans, qi) => {
    if (ans !== null) {
      const s = QUESTIONS[qi].options[ans].scores;
      scores.C += s.C;
      scores.Q += s.Q;
      scores.K += s.K;
    }
  });

  const total = scores.C + scores.Q + scores.K;
  const pct = {
    C: Math.round((scores.C / total) * 100),
    Q: Math.round((scores.Q / total) * 100),
    K: Math.round((scores.K / total) * 100)
  };

  // find winner
  const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
  const w = AREAS[winner];
  const order = [winner, ...Object.keys(AREAS).filter(k => k !== winner)];

  document.getElementById('quiz').style.display = 'none';
  const r = document.getElementById('results');
  r.style.display = 'block';

  r.innerHTML = `
    <div class="results-header">
      <div class="trophy">🏆</div>
      <h2>Your Perfect Match Is…</h2>
      <p>Based on your investment profile and lifestyle preferences</p>
    </div>

    <div class="winner-banner" style="color: ${w.color}; border-color: ${w.color};">
      <div class="winner-tag">Best match for you</div>
      <div class="winner-name">${w.emoji} ${w.name}</div>
      <div class="winner-tagline">${w.tagline}</div>
      <div class="score-bar-section" style="margin-top: 24px;">
        ${Object.keys(pct).map(k => `
          <div class="score-row">
            <span class="score-name" style="color: ${AREAS[k].color}">${AREAS[k].emoji} ${AREAS[k].name.split('/')[0]}</span>
            <div class="score-track">
              <div class="score-fill" style="width: ${pct[k]}%; background: ${AREAS[k].color};"></div>
            </div>
            <span class="score-pct">${pct[k]}%</span>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="area-cards">
      ${order.map((k, idx) => renderAreaCard(AREAS[k], k === winner, pct[k], idx)).join('')}
    </div>

    <button class="restart-btn" onclick="restartQuiz()">↺ Retake the Quiz</button>
  `;
}

function renderAreaCard(area, isWinner, pctScore, idx) {
  const rank = ['1st', '2nd', '3rd'][idx];
  return `
    <div class="area-card ${isWinner ? 'is-winner' : ''}" style="${isWinner ? `border-color: ${area.color}; color: ${area.color}` : ''}">
      <div class="area-card-header">
        <span class="area-emoji">${area.emoji}</span>
        <div>
          <div class="area-card-title" style="${isWinner ? `color: ${area.color}` : ''}">${area.name}</div>
          <div class="area-card-sub">${rank} match · ${pctScore}% fit · ${area.region}</div>
        </div>
      </div>
      <div class="best-for-label">Ideal for</div>
      <div class="tags">${area.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      <p class="area-desc">${area.desc}</p>
      <div class="pros-cons">
        <div class="pros">
          <div class="pros-header">Strengths</div>
          <ul>${area.pros.map(p => `<li>${p}</li>`).join('')}</ul>
        </div>
        <div class="cons">
          <div class="cons-header">Considerations</div>
          <ul>${area.cons.map(c => `<li>${c}</li>`).join('')}</ul>
        </div>
      </div>
    </div>
  `;
}

function restartQuiz() {
  current = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  scores = { C: 0, Q: 0, K: 0 };
  document.getElementById('results').style.display = 'none';
  document.getElementById('hero').style.display = 'block';
}
</script>
</body>
</html>
